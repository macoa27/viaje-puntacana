<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locreros del Sur | PUJ 2026</title>
    <style>
        :root { --blue: #0A84FF; --bg: #000; --card: rgba(28, 28, 30, 0.85); }
        body, html { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; scroll-behavior: smooth; }
        .bg { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('foto-grupo.jpg'); background-position: center; background-size: cover; background-attachment: fixed; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .hero-section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; }
        .container { width: 85%; max-width: 380px; padding: 35px 20px; background: var(--card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .group-name { font-size: 0.8rem; color: var(--blue); font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
        .puj { font-size: 5.5rem; font-weight: 900; letter-spacing: -4px; margin: 0; line-height: 0.9; }
        .dest { color: #fff; font-weight: 700; margin-bottom: 30px; font-size: 1.2rem; opacity: 0.9; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .box { background: rgba(255,255,255,0.08); padding: 18px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05); }
        .num { font-size: 2.2rem; font-weight: 800; display: block; font-variant-numeric: tabular-nums; }
        .unit { font-size: 0.6rem; color: var(--blue); text-transform: uppercase; font-weight: 700; }
        
        .comments-section { width: 90%; max-width: 600px; padding: 80px 0; text-align: center; }
        .challenge-text { font-size: 2.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; text-transform: uppercase; font-style: italic; color: #fff; text-shadow: 0 0 20px var(--blue); }
        .challenge-sub { color: #ccc; font-size: 1.1rem; margin-bottom: 40px; line-height: 1.4; }
        .comment-box { background: #fff; border-radius: 30px; padding: 25px; color: #000; text-align: left; }
        .scroll-hint { position: absolute; bottom: 40px; font-size: 0.7rem; color: #8E8E93; text-transform: uppercase; letter-spacing: 2px; animation: bounce 2s infinite; cursor: pointer; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div class="hero-section">
        <div class="container">
            <div class="group-name">Locreros del Sur</div>
            <div class="puj">PUJ</div>
            <div class="dest">Punta Cana • 24 de Abril</div>
            <div class="grid">
                <div class="box"><span class="num" id="d">00</span><span class="unit">Días</span></div>
                <div class="box"><span class="num" id="h">00</span><span class="unit">Horas</span></div>
                <div class="box"><span class="num" id="m">00</span><span class="unit">Minutos</span></div>
                <div class="box"><span class="num" id="s">00</span><span class="unit">Segundos</span></div>
            </div>
        </div>
        <div class="scroll-hint" onclick="document.getElementById('muro').scrollIntoView()">¿Y el que no firma? ↓</div>
    </div>

    <div id="muro" class="comments-section">
        <div class="challenge-text">¿Y VOS QUÉ VAS A HACER?</div>
        <div class="challenge-sub">
            De Santa Fe al Caribe. Si sos de los <strong>Locreros del Sur</strong> y no firmás este muro, te quedás lavando platos en la Peatonal San Martín. <br><br>
            <strong>¿Quién paga los primeros lisos?</strong> 👇
        </div>
        
        <div class="comment-box">
            <div id="disqus_thread"></div>
        </div>
    </div>

    <script>
        // COUNTDOWN
        const target = new Date("April 24, 2026 00:00:00").getTime();
        function update() {
            const diff = target - new Date().getTime();
            document.getElementById("d").innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById("h").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("m").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
            document.getElementById("s").innerText = Math.floor((diff % (1000*60)) / 1000);
        }
        setInterval(update, 1000); update();

        // DISQUS INTEGRATION
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = 'puj-2026-locreros';
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://https-macoa27-github-io-viaje-puntacana.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
