<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MYLMKQ2TSQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MYLMKQ2TSQ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Locreros del Sur | PUJ 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --blue: #0A84FF; --bg: #000; --card: rgba(28, 28, 30, 0.95); }
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; 
            background-color: #000; color: #fff; min-height: 100vh; width: 100%;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        /* FONDO FORZADO */
        .bg-fixed { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('foto-grupo.jpg'); 
            background-position: center; background-size: cover; background-repeat: no-repeat;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
        }
        
        .weather-bar { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            font-size: 0.7rem; background: rgba(0,0,0,0.85); padding: 10px 18px; 
            border-radius: 25px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15); display: flex; gap: 10px; z-index: 1000; 
            white-space: nowrap;
        }

        .hero-section { 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; width: 100%; 
            text-align: center; padding: 80px 20px 40px 20px;
        }

        .container { 
            width: 100%; max-width: 360px; padding: 35px 20px; 
            background: var(--card); border-radius: 35px; border: 1px solid rgba(255,255,255,0.2); 
            cursor: pointer; position: relative; z-index: 10;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .btn-manija { 
            margin-top: 20px; background: var(--blue); color: #fff; padding: 16px; 
            border-radius: 18px; font-size: 1rem; font-weight: 900; 
            text-transform: uppercase; width: 100%; border: none; cursor: pointer;
        }

        .puj { font-size: 5.5rem; font-weight: 900; letter-spacing: -4px; margin: 0; line-height: 0.9; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .box { background: rgba(255,255,255,0.08); padding: 18px; border-radius: 22px; }
        .num { font-size: 2.2rem; font-weight: 800; display: block; }
        .unit { font-size: 0.6rem; color: var(--blue); text-transform: uppercase; font-weight: 700; }
        
        .comments-section { width: 100%; max-width: 600px; margin: 0 auto; padding: 60px 15px; text-align: center; }
        .muro-card {
            background: rgba(255, 255, 255, 0.05); padding: 30px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; backdrop-filter: blur(10px);
        }
        .comment-box { 
            background: transparent; border-radius: 25px; min-height: 500px; 
            width: 100%; border: 1px solid rgba(255,255,255,0.1); padding: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>

    <div class="weather-bar">
        <span>☀️ PUJ: <strong>30°C</strong></span>
        <span style="opacity: 0.3;">|</span>
        <span>🍺 <strong>∞ Lisos</strong></span>
        <span style="opacity: 0.3;">|</span>
        <span>❄️ Sed: <strong>Extrema</strong></span>
    </div>

    <div class="hero-section">
        <div class="container" onclick="manejarClick()">
            <div style="font-size: 0.75rem; color: var(--blue); font-weight: 800; letter-spacing: 3px; margin-bottom: 8px;">LOCREROS DEL SUR</div>
            <div class="puj">PUJ</div>
            <div style="font-weight: 700; opacity: 0.9; font-size: 1.1rem;">Punta Cana • 24 de Abril</div>
            
            <div class="grid">
                <div class="box"><span class="num" id="days">00</span><span class="unit">Días</span></div>
                <div class="box"><span class="num" id="hours">00</span><span class="unit">Horas</span></div>
                <div class="box"><span class="num" id="minutes">00</span><span class="unit">Minutos</span></div>
                <div class="box"><span class="num" id="seconds">00</span><span class="unit">Segundos</span></div>
            </div>

            <button class="btn-manija">¡ESTOY RE MANIJA! 🌴</button>
            <div style="margin-top: 15px; font-size: 0.65rem; color: #8E8E93; font-weight: 700;">MI NIVEL DE MANIJA: <span id="contador-votos" style="color:var(--blue)">0</span></div>
        </div>
        <div style="margin-top: 30px; font-size: 0.7rem; color: #8E8E93; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;" onclick="document.getElementById('muro').scrollIntoView()">Deslizá para el bardeo ↓</div>
    </div>

    <div id="muro" class="comments-section">
        <div class="muro-card">
            <h2 style="font-style: italic; font-weight: 900; font-size: 2rem; margin: 0;">¿SOS LOCRERO O PECHO FRÍO?</h2>
            <p style="color: #ccc; font-size: 0.9rem; margin-top: 10px;">Si no firmás el muro antes de viajar, servís tragos las primeras <strong>24 HORAS</strong>.</p>
        </div>
        <div class="comment-box">
            <div id="disqus_thread"></div>
        </div>
    </div>

    <script>
        // COUNTDOWN CORREGIDO
        const targetDate = new Date("April 24, 2026 00:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            if (diff > 0) {
                document.getElementById("days").innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutes").innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("seconds").innerHTML = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // MANIJA Y SONIDO
        let votos = parseInt(localStorage.getItem('votosManija')) || 0;
        document.getElementById('contador-votos').innerText = votos;

        function manejarClick() {
            // Sonido Sintético
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}

            // Haptics (Vibración)
            if (navigator.vibrate) navigator.vibrate(50);

            // Contador
            votos++;
            localStorage.setItem('votosManija', votos);
            document.getElementById('contador-votos').innerText = votos;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
            
            // Analytics
            if (typeof gtag === 'function') {
                gtag('event', 'click_manija', { 'event_category': 'Interacción' });
            }
        }

        // DISQUS
        var disqus_config = function () {
            this.page.url = "https://macoa27.github.io/viaje-puntacana/";
            this.page.identifier = "puj-locreros-final-v24h-v2";
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://https-macoa27-github-io-viaje-puntacana.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
